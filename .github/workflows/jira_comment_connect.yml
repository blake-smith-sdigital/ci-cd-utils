name: Upload GitHub Comment to Jira

on:
  # For comments on issues or PRs
  issue_comment:
    types: [created]

jobs:
  upload_to_jira:
    runs-on: ubuntu-latest
    permissions:
      issues: read
      pull-requests: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.13.0'

      - name: Get comment details and upload to Jira
        uses: actions/github-script@v6
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        with:
          script: |
            (async () => {
              const issue = context.payload.issue;
              const comment = context.payload.comment;
              
              if (!comment) {
                core.info('No comment found, skipping.');
                return;
              }
              
              const commentBody = comment.body;

              let ticketKeys = [];

              // We're now only focusing on comment text for ticket keys

              // 2. If not found in branch name, try to extract from the comment body
              if (ticketKeys.length === 0) {
                const commentTicketKeyRegex = /(SCOM-\d+)/g;
                const commentTicketKeyMatches = commentBody.match(commentTicketKeyRegex);
                if (commentTicketKeyMatches && commentTicketKeyMatches.length > 0) {
                  ticketKeys = commentTicketKeyMatches;
                  core.info(`Found Jira ticket key(s) in comment: ${ticketKeys.join(', ')}`);
                } else {
                  core.info('No Jira ticket key found in branch name or comment, skipping.');
                  return;
                }
              }

              const jiraBaseUrl = process.env.JIRA_BASE_URL;
              const jiraApiToken = process.env.JIRA_API_TOKEN;

              const authString = `:${jiraApiToken}`;
              const encodedAuth = Buffer.from(authString).toString('base64');

              const headers = {
                'Authorization': `Basic ${encodedAuth}`,
                'Content-Type': 'application/json',
              };

              async function uploadCommentToJira(ticketKey, commentBody) {
                const jiraCommentUrl = `${jiraBaseUrl}/rest/api/3/issue/${ticketKey}/comment`;
                const jiraCommentPayload = {
                  body: {
                    type: 'doc',
                    version: 1,
                    content: [
                      {
                        type: 'paragraph',
                        content: [
                          {
                            type: 'text',
                            text: commentBody,
                          },
                        ],
                      },
                    ],
                  },
                };

                try {
                  const response = await fetch(jiraCommentUrl, {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify(jiraCommentPayload),
                  });

                  if (!response.ok) {
                    const errorBody = await response.json();
                    core.error(`Failed to add comment to Jira ticket ${ticketKey}: ${response.status} - ${response.statusText}`);
                    core.error(JSON.stringify(errorBody));
                  } else {
                    core.info(`Successfully added comment to Jira ticket: ${ticketKey}`);
                  }
                } catch (error) {
                  core.error(`Failed to add comment to Jira ticket ${ticketKey}: ${error.message}`);
                }
              }

              for (const ticketKey of [...new Set(ticketKeys)]) {
                const commentContent = commentBody.startsWith(`${ticketKey}:`)
                  ? commentBody.substring(commentBody.indexOf(':') + 1).trim()
                  : commentBody;
                await uploadCommentToJira(ticketKey, commentContent);
              }
            })();