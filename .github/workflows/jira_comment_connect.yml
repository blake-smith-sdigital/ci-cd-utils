name: Upload GitHub Comment to Jira

on:
  # issue_comment:
  #   types: [created]
  pull_request:
    types: [closed]
    branches:
      - develop

jobs:
  upload_to_jira:
    runs-on: ubuntu-latest
    permissions:
      issues: read
      pull-requests: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get comment details and upload to Jira
        uses: actions/github-script@v6
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        with:
          script: |
            # const github = require('@actions/github');
            # const core = require('@actions/core');
            const axios = require('axios');

            const pullRequest = context.payload.pull_request;
            
            let ticketKeys = [];

            // Get ticket key only from the branch name
            if (pullRequest && pullRequest.head && pullRequest.head.ref) {
              const branchName = pullRequest.head.ref;
              const branchTicketKeyMatch = branchName.match(/(SCOM-\d+)/);
              if (branchTicketKeyMatch && branchTicketKeyMatch[1]) {
                ticketKeys.push(branchTicketKeyMatch[1]);
                core.info(`Found Jira ticket key in branch name: ${branchTicketKeyMatch[1]}`);
              } else {
                core.info('No Jira ticket key found in branch name, skipping.');
                return;
              }
            } else {
              core.info('Could not access branch name, skipping.');
              return;
            }

            const jiraBaseUrl = process.env.JIRA_BASE_URL;
            const jiraApiToken = process.env.JIRA_API_TOKEN;

            const authString = `:${jiraApiToken}`;
            const encodedAuth = Buffer.from(authString).toString('base64');

            const headers = {
              'Authorization': `Basic ${encodedAuth}`,
              'Content-Type': 'application/json',
            };

            // Prepare the comment content with PR details
            let contentToUpload = '';
            if (pullRequest) {
              contentToUpload = `Pull Request #${pullRequest.number} was ${pullRequest.merged ? 'merged' : 'closed'}\n\n`;
              contentToUpload += `Title: ${pullRequest.title}\n`;
              if (pullRequest.body) {
                contentToUpload += `Description: ${pullRequest.body}\n`;
              }
              contentToUpload += `URL: ${pullRequest.html_url}`;
            }

            async function uploadCommentToJira(ticketKey, commentContent) {
              const jiraCommentUrl = `${jiraBaseUrl}/rest/api/3/issue/${ticketKey}/comment`;
              const jiraCommentPayload = {
                body: {
                  type: 'doc',
                  version: 1,
                  content: [
                    {
                      type: 'paragraph',
                      content: [
                        {
                          type: 'text',
                          text: commentContent,
                        },
                      ],
                    },
                  ],
                },
              };

              try {
                const response = await axios.post(jiraCommentUrl, jiraCommentPayload, { headers });
                core.info(`Successfully added comment to Jira ticket: ${ticketKey}`);
              } catch (error) {
                core.error(`Failed to add comment to Jira ticket ${ticketKey}: ${error.message}`);
                if (error.response && error.response.data) {
                  core.error(JSON.stringify(error.response.data));
                }
              }
            }

            // Process the ticket key from branch name
            for (const ticketKey of ticketKeys) {
              await uploadCommentToJira(ticketKey, contentToUpload);
            }