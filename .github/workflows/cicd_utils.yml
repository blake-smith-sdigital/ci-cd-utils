name: Auto Increment Release Versioning

on:
  push:
    branches:
      - main

jobs: 
  create-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write

      steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # This fetches all history so we can get the latest tag

      - name: Get latest tag
        id: get_latest_tag
        run: |
          # Get the latest tag that matches version format (e.g., 3.15)
          LATEST_TAG=$(git tag -l | grep -E '^[0-9]+\.[0-9]+$' | sort -V | tail -n 1)
          
          # TODO bs can probably remove this after testing
          if [ -z "$LATEST_TAG" ]; then
            echo "No existing version tag found. Using 0.1 as the starting point."
            LATEST_TAG="0.1"
          fi
          
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST_TAG"
      
      - name: Increment version
        id: increment_version
        run: |
          LATEST_TAG=${{ steps.get-latest-tag.outputs.latest_tag }}
          
          # Split into major and minor parts
          MAJOR=$(echo $LATEST_TAG | cut -d. -f1)
          MINOR=$(echo $LATEST_TAG | cut -d. -f2)
          
          # Increment the minor version
          NEW_MINOR=$((MINOR + 1))
          
          # Create the new version tag
          NEW_TAG="${MAJOR}.${NEW_MINOR}"
          
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "New tag will be: $NEW_TAG"
      
      - name: Create new tag
        run: |
          NEW_TAG=${{ steps.increment-version.outputs.new_tag }}
            
            # Create a new tag
            # These credentials are geenric identifiers that we can leave for github.
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            
            git tag -a $NEW_TAG -m "Release version $NEW_TAG"
            git push origin $NEW_TAG
            
            echo "Successfully created and pushed tag: $NEW_TAG"