name: Auto Increment Version Label

on:
  pull_request:
    types: [closed]
    branches:
      - main  # Change this to your target branch (e.g., main, master, release)

jobs:
  create-next-version-label:
    # Only run this job when PR is merged (not just closed without merging)
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
      contents: read
    
    steps:
      - name: Get and increment version from PR labels
        id: increment-version
        uses: actions/github-script@v6
        with:
          script: |
            // Get labels from the merged PR
            const prLabels = context.payload.pull_request.labels;
            
            // Find version labels (matching pattern X.Y)
            const versionPattern = /^(\d+)\.(\d+)$/;
            const versionLabels = prLabels
              .filter(label => versionPattern.test(label.name))
              .map(label => label.name);
            
            // If multiple version labels exist, use the highest one
            // Sort version labels semantically
            versionLabels.sort((a, b) => {
              const [aMajor, aMinor] = a.split('.').map(Number);
              const [bMajor, bMinor] = b.split('.').map(Number);
              
              if (aMajor !== bMajor) {
                return aMajor - bMajor;
              }
              return aMinor - bMinor;
            });
            
            const latestVersion = versionLabels[versionLabels.length - 1];
            console.log(`Found version label on PR: ${latestVersion}`);
            
            // Increment the version
            const [major, minor] = latestVersion.split('.').map(Number);
            const newMinor = minor + 1;
            const newVersion = `${major}.${newMinor}`;
            
            console.log(`New version label will be: ${newVersion}`);
            core.setOutput("latest_version", latestVersion);
            core.setOutput("new_version", newVersion);
      
      - name: Create new version label
        uses: actions/github-script@v6
        with:
          script: |
            const newVersion = '${{ steps.increment-version.outputs.new_version }}';
            
            try {
              // Create a new label with the incremented version
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: newVersion,
                color: '0366d6', // We can change this color if needed
                description: `Release Version ${newVersion}`
              });
              console.log(`Created new label: ${newVersion}`);
            } catch (error) {
              // If label already exists, just log and continue
              console.log(`Note: Label ${newVersion} may already exist: ${error.message}`);
              if (error.status !== 422) { // 422 means label already exists
                throw error;
              }
            }
            
            console.log(`Successfully created version label ${newVersion} (if it didn't already exist)`);